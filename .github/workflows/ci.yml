name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Sync
        run: uv sync --all-groups
      - name: Lint
        run: uv run ruff check
      - name: Typecheck
        run: uv run mypy
      - name: Test with coverage
        run: uv run pytest --cov=slowbrain --cov-report=term-missing
